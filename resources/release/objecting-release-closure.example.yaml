notes:
  - Objecting closes as a system field-pack foundation dependency and publishes a backend adoption packet bridge.
  - Backend components remain owners of Entity, Doctrine migrations, DTO, Form, Controller, Repository, Service, fixtures, tests, and runtime behavior.
  - Exposing remains the separate API/OpenAPI contract repository and must not be folded into Objecting.
  - Objecting field-pack traits guard uninitialized embeddables while preserving explicit initializeObject* seed methods.
  - Doctrine mapping contract declares how backend entities consume object_* embeddables while retaining migration ownership.
  - Schema mirror contract declares backend/Objecting/Exposing ownership boundaries for DB schema visibility.
  - Exposing bridge contract exports Objecting field-pack, Doctrine mapping, schema mirror, and adoption packet references for the future API contract repository.
  - Backend import contract provides a stable Objecting-side checklist for backend component migrations.
  - Backend clone-cleanup contract documents Addressing and Taxating local Object* clone surfaces as the first pilot candidates without modifying sibling repositories.
  - Backend migration command packet turns the audit and clone-cleanup contract into a Codex-ready touched-files migration command for sibling components.
  - RC stabilization is complete.
  - RC marker created in resources/release/objecting-rc1.example.yaml without expanding runtime responsibility.
  - Objecting package constraints are PHP ^8.4 and Symfony ^8.0 only; Symfony 7 and mixed Symfony 7/8 constraints are forbidden.

