notes:
  - Objecting RC2 supersedes RC1 as the active dependency baseline after systemic packs and backend migration command packet.
  - RC2 includes object_state, object_source, object_fingerprint, and object_scope as active systemic field packs.
  - name, title, description, label, and displayName remain object_title aliases rather than physical duplicate field packs.
  - id remains a backend-owned Doctrine primary key and is not an Objecting field pack.
  - priority and visibility remain deferred systemic tokens until backend usage semantics are separated.
  - Backend migrations remain owned by backend components; Objecting only supplies embeddable field-pack mapping and contracts.
  - Exposing remains the separate API/OpenAPI contract repository.
